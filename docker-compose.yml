version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: flientsec-db
    restart: always
    environment:
      POSTGRES_USER: flientsec
      POSTGRES_PASSWORD: flientsec_dev_pass
      POSTGRES_DB: flientsec
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flientsec-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://flientsec:flientsec_dev_pass@db:5432/flientsec
      JWT_SECRET: super_secret_jwt_key_for_dev_123
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      ENV: dev
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flientsec-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
